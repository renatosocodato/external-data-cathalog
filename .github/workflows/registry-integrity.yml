name: registry-integrity

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-registry:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate registry and provenance artifacts
        run: python3 scripts/registry_integrity_check.py

      - name: Quick content policy check
        run: |
          test -s MANIFEST_INDEX.md
          test -s DATA_README.md
          test -s EXTERNAL_DATA_CATALOG.md
          echo "Core manifests present."
