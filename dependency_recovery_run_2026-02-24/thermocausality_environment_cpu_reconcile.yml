# ThermoCausality MTCE - Conda Environment Specification

name: thermocausality
channels:
  - conda-forge
  - pytorch
  - nvidia

dependencies:
  # Core Python
  - python=3.10

  # Numerical computing
  - numpy>=1.24
  - scipy>=1.11
  - pandas>=2.0

  # JAX (GPU-accelerated)
  - jax>=0.4.0
  - jaxlib>=0.4.0

  # PyTorch (neural networks)
  - pytorch>=2.0
  - torchvision
  - torchaudio

  # Machine learning
  - scikit-learn>=1.3

  # Visualization
  - matplotlib>=3.7
  - seaborn>=0.12
  - plotly>=5.14

  # Jupyter
  - jupyter
  - jupyterlab
  - ipykernel

  # Symbolic math
  - sympy>=1.12

  # File I/O
  - h5py
  - netcdf4
  - xarray  # For spatial fields (.nc format)

  # Database
  - sqlite
  - sqlalchemy

  # Development
  - pytest
  - black
  - flake8
  - mypy

  # Documentation
  - sphinx
  - sphinx_rtd_theme

  # Pip packages (not available via conda)
  - pip
  - pip:
    # Neural operators
    - deepxde>=1.9

    # Gaussian processes
    - gpytorch>=1.11

    # Simulation-based inference
    - sbi>=0.22

    # Information geometry
    - geomstats>=2.6

    # Genetic programming
    - gplearn>=0.4
    - deap>=1.3

    # Sparse identification
    - pysindy>=1.7

    # Causal inference
    - causalnex>=0.12
    - dowhy>=0.9

    # Markov state models
    - pyemma>=2.5

    # Thermodynamics utilities (conceptual - may not exist yet)
    # - thermopy  # If available

    # Progress bars
    - tqdm

    # Configuration
    - pyyaml
    - omegaconf

    # Logging
    - wandb  # Weights & Biases (optional, for experiment tracking)

# Post-install verification
# Run: python -c "import jax; print(jax.devices())"  # Should show GPU
# Run: python -c "import torch; print(torch.cuda.is_available())"  # Should be True

# Notes:
# 3. Some specialized packages may need manual installation
